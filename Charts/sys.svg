<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Superstore Sales Intelligence System Architecture</title>
  <desc id="desc">A data pipeline from CSV sales data through data preparation to four analytics modules and a Streamlit dashboard, supported by persistent cache files.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#111827"/></marker>
    <style>
      .bg{fill:#ffffff}.node{fill:#ffffff;stroke:#111827;stroke-width:3}.accent{fill:#dceaff;stroke:#005db6;stroke-width:3}.cache{fill:#f4f4f5;stroke:#111827;stroke-width:3}.line{fill:none;stroke:#111827;stroke-width:3;marker-end:url(#arrow)}.title{font:700 38px Arial,sans-serif;fill:#000}.label{font:700 23px Arial,sans-serif;fill:#000}.sub{font:400 17px Arial,sans-serif;fill:#000}.small{font:600 18px Arial,sans-serif;fill:#000}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="800" y="70" text-anchor="middle">Superstore Sales Intelligence — System Architecture</text>
  <rect class="node" x="85" y="160" width="250" height="130" rx="16"/>
  <text class="label" x="210" y="215" text-anchor="middle">CSV Sales Data</text>
  <text class="sub" x="210" y="248" text-anchor="middle">train.csv</text>
  <path class="line" d="M335 225 H450"/>
  <rect class="accent" x="460" y="145" width="310" height="160" rx="16"/>
  <text class="label" x="615" y="205" text-anchor="middle">Data Loader</text>
  <text class="sub" x="615" y="238" text-anchor="middle">Date parsing · feature engineering</text>
  <text class="sub" x="615" y="264" text-anchor="middle">Cached DataFrame</text>
  <path class="line" d="M770 225 H850 V150 H915"/>
  <path class="line" d="M770 225 H850 V330 H915"/>
  <path class="line" d="M770 225 H850 V510 H915"/>
  <path class="line" d="M770 225 H850 V690 H915"/>
  <rect class="accent" x="925" y="85" width="305" height="130" rx="16"/>
  <text class="label" x="1078" y="140" text-anchor="middle">Sales Overview</text>
  <text class="sub" x="1078" y="173" text-anchor="middle">Interactive Plotly charts</text>
  <rect class="accent" x="925" y="265" width="305" height="130" rx="16"/>
  <text class="label" x="1078" y="320" text-anchor="middle">Prophet Forecasting</text>
  <text class="sub" x="1078" y="353" text-anchor="middle">Prophet · SARIMA · XGBoost</text>
  <rect class="accent" x="925" y="445" width="305" height="130" rx="16"/>
  <text class="label" x="1078" y="500" text-anchor="middle">Anomaly Detection</text>
  <text class="sub" x="1078" y="533" text-anchor="middle">Isolation Forest · Z-Score</text>
  <rect class="accent" x="925" y="625" width="305" height="130" rx="16"/>
  <text class="label" x="1078" y="680" text-anchor="middle">Demand Clustering</text>
  <text class="sub" x="1078" y="713" text-anchor="middle">KMeans · PCA · Silhouette</text>
  <path class="line" d="M1230 150 H1300 V400 H1355"/>
  <path class="line" d="M1230 330 H1300 V400 H1355"/>
  <path class="line" d="M1230 510 H1300 V400 H1355"/>
  <path class="line" d="M1230 690 H1300 V400 H1355"/>
  <rect class="node" x="1365" y="320" width="180" height="160" rx="16"/>
  <text class="label" x="1455" y="380" text-anchor="middle">Streamlit</text>
  <text class="label" x="1455" y="410" text-anchor="middle">Dashboard</text>
  <text class="sub" x="1455" y="443" text-anchor="middle">Four live views</text>
  <path class="line" d="M1078 575 V805"/>
  <path class="line" d="M1078 755 V805"/>
  <rect class="cache" x="760" y="815" width="640" height="62" rx="14"/>
  <text class="small" x="1080" y="853" text-anchor="middle">Persistent Cache: anomaly_results.pkl  |  cluster_results.pkl</text>
</svg>
